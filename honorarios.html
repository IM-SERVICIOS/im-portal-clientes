<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Honorarios | Portal de Clientes - IM Servicios Contables</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/honorarios.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="dashboard-body">

<div class="dashboard-shell">

    <aside class="sidebar">

        <div class="sidebar-logo">
            <img src="assets/logo.png" alt="IM Servicios Contables">
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">Mis Clientes</a>
            <a href="declaraciones.html" class="nav-item">Declaraciones</a>
            <a href="honorarios.html" class="nav-item active">Honorarios</a>
            <a href="documentos.html" class="nav-item">Documentos</a>
        </nav>

        <button id="btnCerrarSesion" class="sidebar-logout">Cerrar Sesión</button>

    </aside>

    <main class="dashboard-main">

        <header class="dashboard-header">
            <div>
                <h1>Honorarios</h1>
                <p class="subtitle">Estado de pago de honorarios de tus clientes</p>
            </div>
            <div class="usuario-info">
                <span id="nombreUsuario">Cargando...</span>
                <span id="rolUsuario" class="badge-rol"></span>
            </div>
        </header>

        <section id="estadoCarga" class="estado-carga">Cargando honorarios...</section>

        <section id="contenidoHonorarios" style="display:none;">

            <div class="kpi-grid">

                <div class="kpi-card">
                    <div class="kpi-icono kpi-1">💼</div>
                    <div class="kpi-texto">
                        <p class="kpi-label">Honorarios registrados</p>
                        <p class="kpi-valor" id="kpiTotalHonorarios">0</p>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icono kpi-3">✅</div>
                    <div class="kpi-texto">
                        <p class="kpi-label">Cobrado</p>
                        <p class="kpi-valor" id="kpiCobrado">$0.00</p>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icono kpi-4">⚠️</div>
                    <div class="kpi-texto">
                        <p class="kpi-label">Por cobrar</p>
                        <p class="kpi-valor" id="kpiPorCobrar">$0.00</p>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icono kpi-2">👥</div>
                    <div class="kpi-texto">
                        <p class="kpi-label">Clientes con adeudo</p>
                        <p class="kpi-valor" id="kpiClientesAdeudo">0</p>
                    </div>
                </div>

            </div>

            <div class="filtros-card">

                <label class="filtro-campo">
                    Cliente
                    <select id="filtroCliente">
                        <option value="todos">Todos</option>
                    </select>
                </label>

                <label class="filtro-campo">
                    Estatus
                    <select id="filtroEstatus">
                        <option value="todos">Todos</option>
                        <option value="pagado">Pagado</option>
                        <option value="falta_pago">Falta pago</option>
                    </select>
                </label>

            </div>

            <div class="tabla-card">
                <table class="tabla-honorarios">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Periodo</th>
                            <th>Importe</th>
                            <th>Estatus</th>
                            <th>Fecha de pago</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHonorariosBody"></tbody>
                </table>
            </div>

        </section>

    </main>

</div>

<script src="js/supabase.js"></script>
<script src="js/honorarios.js"></script>

</body>
</html>
